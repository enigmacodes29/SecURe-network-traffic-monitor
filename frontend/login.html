<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecURe — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c10;
      --surface: #0d1117;
      --border: #1f2d3d;
      --accent: #00ffe0;
      --accent2: #ff4d6d;
      --text: #c9d1d9;
      --dim: #4a5568;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,224,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,224,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* scanning line */
    body::after {
      content: '';
      position: fixed;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
      animation: scan 4s linear infinite;
      z-index: 0;
    }

    @keyframes scan {
      0%   { top: -2px; }
      100% { top: 100vh; }
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .brand h1 {
      font-family: var(--sans);
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: #fff;
    }

    .brand h1 span { color: var(--accent); }

    .brand p {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.2em;
      margin-top: 0.4rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--dim);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,255,224,0.08);
    }

    .field input::placeholder { color: var(--dim); }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }

    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .msg {
      margin-top: 1rem;
      padding: 0.65rem 0.9rem;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 0.78rem;
      text-align: center;
      display: none;
    }

    .msg.error {
      display: block;
      background: rgba(255,77,109,0.1);
      border: 1px solid rgba(255,77,109,0.3);
      color: var(--accent2);
    }

    .msg.success {
      display: block;
      background: rgba(0,255,224,0.08);
      border: 1px solid rgba(0,255,224,0.2);
      color: var(--accent);
    }

    .hint {
      margin-top: 1.25rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <span class="brand-icon">🔐</span>
    <h1>Sec<span>URe</span></h1>
    <p>NETWORK SECURITY MONITOR // v1.0</p>
  </div>

  <div class="card">
    <div class="field">
      <label>Username</label>
      <input id="username" type="text" placeholder="enter username" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Authenticate</button>
    <div class="msg" id="msg"></div>
  </div>

</div>

<script>
  const API = "http://localhost:8000";

  async function login() {
    const btn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    msg.className = "msg";
    msg.textContent = "";

    if (!username || !password) {
      showMsg("error", "⚠ Username and password are required.");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Authenticating...";

    try {
      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (res.ok && data.status === "success") {
        showMsg("success", `✓ Access granted. Welcome, ${data.username}.`);
        localStorage.setItem("token", data.token);
        localStorage.setItem("username", data.username);
        setTimeout(() => window.location.href = "index.html", 800);
      } else {
        showMsg("error", `⛔ ${data.detail || "Authentication failed."}`);
        btn.disabled = false;
        btn.textContent = "Authenticate";
      }
    } catch (e) {
      showMsg("error", "⚠ Cannot reach server. Is the backend running?");
      btn.disabled = false;
      btn.textContent = "Authenticate";
    }
  }

  function showMsg(type, text) {
    const msg = document.getElementById("msg");
    msg.className = `msg ${type}`;
    msg.textContent = text;
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });
</script>
</body>
</html>
